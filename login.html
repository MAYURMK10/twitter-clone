<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in / Loopr</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
        }

        .logo-large {
            width: 60px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            background: black;
            border: 1px solid var(--gray-700);
            border-radius: 4px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .input-field:focus {
            border-color: var(--blue-500);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: white;
            color: black;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            background-color: #dcdcdc;
            /* transform: scale(1.02); transition: 0.2s; */
        }

        .auth-link {
            color: var(--blue-500);
            text-decoration: none;
        }

        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <img src="loop_logo1.png" alt="Loopr" class="logo-large">
        <h1>Sign in to Loopr</h1>

        <form id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" class="input-field" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" class="input-field" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn" id="login-btn">Log in</button>
        </form>

        <p style="color: var(--gray-500);">
            Don't have an account? <a href="signup.html" class="auth-link">Sign up</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>

</html>
